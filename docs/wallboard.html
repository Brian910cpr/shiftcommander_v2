<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftCommander Wallboard</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0f1b2d;
      --panel2: #16243a;
      --border: #243754;
      --text: #eef4ff;
      --muted: #a7b8d8;

      --green-bg: rgba(18, 54, 31, 0.76);
      --green-bd: #2d8a4b;

      --red-bg: rgba(92, 20, 24, 0.88);
      --red-bd: #ff5b5b;

      --gray-bg: rgba(28, 35, 49, 0.9);
      --gray-bd: #4c5a70;

      --name-green: #52ef7f;
      --name-blue: #69b8ff;
      --name-pink: #ff8fcb;
      --name-red: #ff9c9c;
      --name-default: #eef4ff;
      --name-dark: #d7dfec;

      --today-ring: #8fd3ff;
      --today-glow: rgba(143, 211, 255, 0.18);

      --past-dim: 0.76;
      --future-soft: 0.96;

      --open-seat-border: rgba(255, 100, 100, 0.9);
      --open-seat-glow: rgba(255, 100, 100, 0.24);
      --month-line: rgba(143, 211, 255, 0.28);
      --month-line-strong: rgba(143, 211, 255, 0.42);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body { padding: 14px; }

    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
      padding: 18px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    .title {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 0.25px;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 18px;
      color: var(--muted);
    }

    .meta {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .meta-pill,
    .nav-btn {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
    }

    .meta-pill.quiet {
      background: rgba(255,255,255,0.035);
      color: var(--muted);
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      background: rgba(255,255,255,0.035);
      font-size: 12px;
      font-weight: 900;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--name-default);
    }

    .legend-dot.als { background: var(--name-blue); }
    .legend-dot.emt { background: var(--name-green); }
    .legend-dot.open { background: var(--name-red); }
    .legend-dot.ncld { background: var(--name-pink); }
    .legend-dot.duty { background: #101722; border: 1px solid #526071; }

    .nav-btn {
      cursor: pointer;
      font-weight: 800;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .nav-btn:hover {
      border-color: var(--today-ring);
      background: rgba(255,255,255,0.05);
    }

    .nav-btn:active {
      transform: translateY(1px);
    }

    .weekday-row {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .weekday {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
      padding: 10px 6px;
      font-size: 18px;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: 0.4px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .day-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 280px;
      transition: box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      position: relative;
    }

    .day-card.past { opacity: var(--past-dim); }
    .day-card.future { opacity: var(--future-soft); }

    .day-card.today {
      border-color: var(--today-ring);
      box-shadow: 0 0 0 2px var(--today-ring), 0 0 24px var(--today-glow);
      opacity: 1;
    }

    .day-card.month-row-start::before,
    .day-card.month-row-end::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(90deg, transparent 0%, var(--month-line-strong) 8%, var(--month-line) 50%, var(--month-line-strong) 92%, transparent 100%);
    }

    .day-card.month-row-start::before { top: 0; }
    .day-card.month-row-end::after { bottom: 0; }

    .day-card.month-boundary-right::after,
    .day-card.month-boundary-left::before {
      content: "";
      position: absolute;
      top: 8px;
      bottom: 8px;
      width: 2px;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(180deg, transparent 0%, var(--month-line-strong) 8%, var(--month-line) 50%, var(--month-line-strong) 92%, transparent 100%);
    }

    .day-card.month-boundary-right::after { right: -1px; }
    .day-card.month-boundary-left::before { left: -1px; }

    .day-header {
      padding: 12px 14px 10px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .day-number {
      font-size: 46px;
      font-weight: 900;
      line-height: 0.9;
      text-align: left;
      min-width: 34px;
    }

    .day-meta {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .day-title {
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .day-subtitle {
      margin-top: 2px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      color: var(--muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .birthday-indicator {
      justify-self: end;
      align-self: start;
      font-size: 18px;
      line-height: 1;
      opacity: 0.96;
    }

    .day-number {
      font-size: 44px;
      font-weight: 900;
      line-height: 0.95;
      text-align: center;
      min-width: 34px;
    }

    .shift-list {
      padding: 10px 10px 12px 10px;
      display: grid;
      gap: 10px;
      flex: 1;
    }

    .shift-card {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      display: grid;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .shift-card.green,
    .shift-card.gray {
      background: var(--panel2);
      border-color: var(--border);
      box-shadow: none;
    }

    .shift-card.red {
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01)), var(--red-bg);
      border-color: var(--red-bd);
      box-shadow: inset 0 0 0 1px rgba(255, 91, 91, 0.12);
    }

    .shift-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 22px;
    }

    .shift-name {
      font-size: 18px;
      color: var(--text);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      font-weight: 900;
      line-height: 1;
    }

    .shift-status {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .slots {
      display: grid;
      gap: 8px;
    }

    .slot {
      padding: 9px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.07);
      min-height: 62px;
      display: grid;
      grid-template-columns: minmax(76px, 0.42fr) minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }

    .slot.duty-seat {
      background: rgba(7, 10, 15, 0.84);
      border-color: rgba(180, 191, 210, 0.2);
    }

    .slot.open-seat {
      border-color: var(--open-seat-border);
      background: rgba(118, 22, 27, 0.52);
    }

    .slot.open-calm {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .slot.open-soon {
      animation: slowPulseRed 3.8s ease-in-out infinite;
    }

    .slot.open-near {
      animation: slowPulseRed 2.7s ease-in-out infinite;
    }

    .slot.open-now {
      background: rgba(155, 28, 34, 0.74);
      animation: slowPulseRed 1.9s ease-in-out infinite;
    }

    @keyframes slowPulseRed {
      0% { box-shadow: 0 0 0 0 rgba(255, 100, 100, 0.03); }
      50% { box-shadow: 0 0 20px 4px var(--open-seat-glow); }
      100% { box-shadow: 0 0 0 0 rgba(255, 100, 100, 0.03); }
    }

    .seat-role {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.08em;
      line-height: 1.15;
      text-transform: uppercase;
    }

    .member {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      font-size: 25px;
      font-weight: 900;
      line-height: 1.02;
      word-break: break-word;
      letter-spacing: 0.1px;
      text-align: left !important;
      width: 100%;
      padding: 4px 0;
      border-radius: 12px;
      background: transparent;
    }

    .member.green { color: var(--name-green); }
    .member.blue { color: var(--name-blue); }
    .member.pink { color: var(--name-pink); }
    .member.red { color: var(--name-red); }
    .member.dark { color: var(--name-dark); }
    .member.default { color: var(--name-default); }
    .member.empty {
      color: #ffd1d1;
      font-style: normal;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
      letter-spacing: 0.04em;
    }

    .slot-note {
      grid-column: 2;
      margin-top: -6px;
      color: rgba(238,244,255,0.62);
      font-size: 11px;
      font-weight: 800;
    }


    .state {
      padding: 40px;
      text-align: center;
      font-size: 24px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .state-title {
      color: var(--text);
      font-size: 28px;
      font-weight: 900;
    }

    .state-detail {
      margin-top: 12px;
      font-size: 18px;
      line-height: 1.45;
    }

    .state-url {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #d9e8ff;
      font-family: Consolas, monospace;
      font-size: 14px;
      word-break: break-all;
    }

    .footer {
      margin-top: 14px;
      text-align: right;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 1800px) {
      .member { font-size: 22px; }
      .day-number { font-size: 30px; }
    }

    @media (max-width: 1350px) {
      .weekday-row, .board { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 1000px) {
      .weekday-row, .board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .header { grid-template-columns: 1fr; }
      .meta { justify-items: start; }
      .meta-row { justify-content: flex-start; }
      .legend { justify-content: flex-start; }
    }

    @media (max-width: 700px) {
      .weekday-row, .board { grid-template-columns: 1fr; }
      .title { font-size: 28px; }
      .member { font-size: 22px; text-align: left; }
      .slot { grid-template-columns: 1fr; gap: 4px; }
      .slot-note { grid-column: 1; margin-top: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">ShiftCommander Wallboard</div>
      <div class="subtitle" id="subtitle">Here is who is working. Here is what is open.</div>
    </div>
    <div class="meta">
      <div class="meta-row">
        <button class="nav-btn" id="prevWeekBtn">← Prev Week</button>
        <button class="nav-btn" id="todayBtn">Today</button>
        <button class="nav-btn" id="nextWeekBtn">Next Week →</button>
      </div>
      <div class="legend" aria-label="Wallboard colors">
        <span class="legend-chip"><span class="legend-dot als"></span>AEMT / ALS</span>
        <span class="legend-chip"><span class="legend-dot emt"></span>EMT</span>
        <span class="legend-chip"><span class="legend-dot open"></span>OPEN</span>
        <span class="legend-chip"><span class="legend-dot ncld"></span>NCLD</span>
        <span class="legend-chip"><span class="legend-dot duty"></span>Duty / Fire</span>
      </div>
      <div class="meta-row">
        <div class="meta-pill quiet" id="metaWindow">Showing: --</div>
        <div class="meta-pill quiet" id="metaUpdated">Updated: --</div>
      </div>
    </div>
  </div>

  <div class="weekday-row" id="weekdayRow"></div>
  <div id="app" class="state">Loading wallboard...</div>
  <div class="footer">Auto-refresh every 60 seconds</div>

  <script>
    const BUILD_CODE = "SC-BUILD-2026-05-04-ONLINE-AUTH-QT-001";
    const PUBLIC_API_BASE = "https://shiftcommander-v2.onrender.com";
    function defaultApiBase(){
      const host = window.location.hostname;
      return host === "adr-fr.org" || host === "www.adr-fr.org" ? PUBLIC_API_BASE : "";
    }
    const API_BASE = window.SC_API_BASE_URL || defaultApiBase() || localStorage.getItem("sc_api_base_url") || "";
    const SCHEDULE_URL = "/api/schedule";
    const MEMBERS_URL = "/api/wallboard_members";
    const REFRESH_MS = 60000;
    const SCHEDULE_TIMEOUT_MS = 15000;
    const MEMBERS_TIMEOUT_MS = 8000;
    const IDLE_RESET_MS = 60000;
    const VISIBLE_WEEKS = 5;
    const VISIBLE_DAYS = VISIBLE_WEEKS * 7;
    const WEEKDAY_LABELS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    let currentWeekOffset = 0;
    let lastLoadedData = null;
    let idleTimer = null;

    function apiUrl(path) {
      return `${API_BASE}${path}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function apiUrlWithCacheBust(path) {
      const fullUrl = apiUrl(path);
      return `${fullUrl}${fullUrl.includes("?") ? "&" : "?"}t=${Date.now()}`;
    }

    async function fetchJson(path, timeoutMs) {
      const fullUrl = apiUrlWithCacheBust(path);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(fullUrl, {
          cache: "no-store",
          credentials: "include",
          signal: controller.signal
        });
        const text = await response.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch (error) {
          const jsonError = new Error(`Response was not JSON from ${fullUrl}`);
          jsonError.url = fullUrl;
          jsonError.status = response.status;
          throw jsonError;
        }
        if (!response.ok) {
          const httpError = new Error(`HTTP ${response.status} from ${fullUrl}`);
          httpError.url = fullUrl;
          httpError.status = response.status;
          httpError.preview = String(text || "").slice(0, 180);
          throw httpError;
        }
        return { data, url: fullUrl, status: response.status };
      } catch (error) {
        if (error?.name === "AbortError") {
          const timeoutError = new Error(`Timed out after ${Math.round(timeoutMs / 1000)} seconds`);
          timeoutError.url = fullUrl;
          timeoutError.status = "timeout";
          throw timeoutError;
        }
        error.url ||= fullUrl;
        error.status ||= "failed";
        throw error;
      } finally {
        clearTimeout(timer);
      }
    }

    function schedulePayload(raw) {
      if (Array.isArray(raw?.shifts)) return raw;
      if (Array.isArray(raw?.schedule?.shifts)) return raw.schedule;
      if (Array.isArray(raw?.data?.shifts)) return raw.data;
      return { build: raw?.build || {}, shifts: [] };
    }

    function showNoScheduleBuilt() {
      const app = document.getElementById("app");
      app.className = "state";
      app.innerHTML = `
        <div class="state-title">No schedule built yet</div>
        <div class="state-detail">Once shifts are generated, this wallboard will show who is working and what is open.</div>
      `;
    }

    function showApiError(error) {
      const app = document.getElementById("app");
      app.className = "state";
      app.innerHTML = `
        <div class="state-title">Could not load the wallboard</div>
        <div class="state-detail">Status: ${escapeHtml(error?.status || "failed")}</div>
        <div class="state-url">${escapeHtml(error?.url || apiUrl(SCHEDULE_URL))}</div>
        <div class="state-detail">Please refresh this page in a moment.</div>
      `;
    }

    function renderRuntimeMeta() {
      document.body.dataset.apiBase = API_BASE || "same-origin";
    }

    function renderWeekdayRow() {
      const row = document.getElementById("weekdayRow");
      row.innerHTML = WEEKDAY_LABELS.map(label => `<div class="weekday">${label}</div>`).join("");
    }

    function parseIsoDate(dateStr) {
      return new Date(`${dateStr}T00:00:00`);
    }

    function toIsoLocal(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      const day = String(dateObj.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatGeneratedAt(value) {
      if (!value) return "--";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString();
    }

    function getTodayDate() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function getTodayIso() {
      return toIsoLocal(getTodayDate());
    }

    function compareIso(a, b) {
      if (a < b) return -1;
      if (a > b) return 1;
      return 0;
    }

    function addDays(dateObj, days) {
      const d = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
      d.setDate(d.getDate() + days);
      return d;
    }

    function startOfWeekSunday(dateObj) {
      const d = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
      d.setDate(d.getDate() - d.getDay());
      return d;
    }

    function buildVisibleDates(weekOffset = 0) {
      const today = getTodayDate();
      const thisWeekStart = startOfWeekSunday(today);
      const offsetWeekStart = addDays(thisWeekStart, weekOffset * 7);
      const visibleStart = addDays(offsetWeekStart, -7);
      const dates = [];

      for (let i = 0; i < VISIBLE_DAYS; i++) {
        const d = addDays(visibleStart, i);
        dates.push({ iso: toIsoLocal(d), dateObj: d });
      }

      return dates;
    }

    function formatDayParts(iso) {
      const d = parseIsoDate(iso);
      if (Number.isNaN(d.getTime())) {
        return { weekday: iso, dayNum: "", monthLabel: "" };
      }

      return {
        weekday: d.toLocaleDateString(undefined, { weekday: "short" }),
        dayNum: d.toLocaleDateString(undefined, { day: "numeric" }),
        monthLabel: d.toLocaleDateString(undefined, { month: "short", year: "numeric" }).toUpperCase(),
        month: d.getMonth(),
        year: d.getFullYear()
      };
    }

    function shortShiftLabel(label) {
      const raw = String(label || "").trim();
      return raw.replace(/\s+shift$/i, "");
    }

    function normalizeCertValue(value) {
      const raw = String(value || "").trim().toUpperCase();
      if (!raw) return "";
      if (raw === "PARAMEDIC" || raw === "AEMT" || raw === "ALS") return "ALS";
      if (raw === "EMT") return "EMT";
      if (raw === "NCLD") return "NCLD";
      return raw;
    }

    function seatCertValue(seat, memberLookup) {
      const assignedId = String(seat?.assigned ?? "").trim();
      const assignedName = String(seat?.assigned_name || "").trim();
      const fromId = assignedId ? memberLookup?.byId?.get(assignedId) : null;
      const fromName = assignedName ? memberLookup?.byName?.get(assignedName.toUpperCase()) : null;
      return normalizeCertValue(seat?.cert || seat?.ops_cert || seat?.raw_cert || fromId?.cert || fromName?.cert || "");
    }

    function isOpenName(value) {
      const raw = String(value || "").trim().toUpperCase();
      return !raw || raw === "OPEN" || raw === "UNFILLED";
    }

    function isAttendantSeat(seat) {
      const role = `${seat?.role || ""} ${seat?.display_role || ""}`.toUpperCase();
      return role.includes("ATTENDANT") || role.includes("ALS");
    }

    function isDutySeat(seat) {
      const role = `${seat?.role || ""} ${seat?.display_role || ""}`.toUpperCase();
      return role.includes("DUTY") || role.includes("FIRE");
    }

    function isDriverSeat(seat) {
      const role = `${seat?.role || ""} ${seat?.display_role || ""}`.toUpperCase();
      return role.includes("DRIVER") || role.includes("SUPPORT") || isDutySeat(seat);
    }

    function buildMemberLookup(payload) {
      const members = Array.isArray(payload?.members) ? payload.members : (Array.isArray(payload) ? payload : []);
      const byId = new Map();
      const byName = new Map();

      for (const member of members) {
        const memberId = String(member?.member_id ?? member?.id ?? "").trim();
        const name = String(member?.name || [member?.first_name, member?.last_name].filter(Boolean).join(" ")).trim();
        const cert = normalizeCertValue(member?.ops_cert || member?.cert || member?.raw_cert || "");
        const birthdayMonthDay = normalizeBirthdayMonthDay(member?.birthday_mmdd || member?.birthday);

        const entry = {
          id: memberId,
          name,
          cert,
          birthdayMonthDay
        };

        if (memberId) byId.set(memberId, entry);
        if (name) byName.set(name.toUpperCase(), entry);
      }

      return { byId, byName };
    }

    function normalizeBirthdayMonthDay(value) {
      const raw = String(value || "").trim();
      if (!raw) return null;
      const shortValue = raw.match(/^(\d{2})[-/](\d{2})$/);
      if (shortValue) return `${shortValue[1]}-${shortValue[2]}`;
      const isoValue = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (isoValue) return `${isoValue[2]}-${isoValue[3]}`;
      const slashValue = raw.match(/^(\d{1,2})\/(\d{1,2})(?:\/\d{2,4})?$/);
      if (slashValue) return `${slashValue[1].padStart(2, "0")}-${slashValue[2].padStart(2, "0")}`;
      return null;
    }

    function resolveMemberEntry(seat, memberLookup) {
      const assignedId = String(seat?.assigned ?? "").trim();
      const assignedName = String(seat?.assigned_name || "").trim();
      if (assignedId && memberLookup?.byId?.has(assignedId)) return memberLookup.byId.get(assignedId);
      if (assignedName && memberLookup?.byName?.has(assignedName.toUpperCase())) return memberLookup.byName.get(assignedName.toUpperCase());
      return null;
    }

    function colorClassFromSeat(seat, memberLookup) {
      const rawName = String(seat?.assigned_name || "").trim();
      const rawId = String(seat?.assigned ?? "").trim();

      if (!rawName && !rawId) return "default";
      if (rawName.toUpperCase() === "OPEN" || rawName.toUpperCase() === "UNFILLED") return "red";

      const fromId = rawId ? memberLookup?.byId?.get(rawId) : null;
      const fromName = rawName ? memberLookup?.byName?.get(rawName.toUpperCase()) : null;
      const cert = normalizeCertValue(fromId?.cert || fromName?.cert || "");

      if (isDutySeat(seat)) return "dark";
      if (cert === "ALS") return "blue";
      if (cert === "EMT") return "green";
      if (cert === "NCLD") return "pink";
      return "default";
    }

    function seatSortPriority(seat, memberLookup) {
      const colorClass = colorClassFromSeat(seat, memberLookup);
      if (isAttendantSeat(seat)) return 0;
      if (isDriverSeat(seat)) return 1;
      if (colorClass === "blue") return 0;
      if (colorClass === "green") return 1;
      if (colorClass === "pink") return 2;
      const rawName = String(seat?.assigned_name || "").trim().toUpperCase();
      if (!rawName || rawName === "OPEN" || rawName === "UNFILLED") return 4;
      return 3;
    }

    function isPastDate(isoDate) {
      const today = getTodayDate();
      const d = parseIsoDate(isoDate);
      if (Number.isNaN(d.getTime())) return false;
      return d < today;
    }

    function displayAssignedName(shiftDate, assignedName) {
      const raw = String(assignedName || "").trim();
      if (raw.toUpperCase() === "OPEN" && isPastDate(shiftDate)) return "—";
      if (!raw) return isPastDate(shiftDate) ? "—" : "OPEN";
      return raw;
    }

    function daysUntil(isoDate) {
      const d = parseIsoDate(isoDate);
      if (Number.isNaN(d.getTime())) return 999;
      return Math.round((d - getTodayDate()) / 86400000);
    }

    function openUrgencyClass(isoDate) {
      const days = daysUntil(isoDate);
      if (days <= 1) return "open-now";
      if (days <= 3) return "open-near";
      if (days <= 7) return "open-soon";
      return "open-calm";
    }

    function seatRoleLabel(seat, forceAlsOpen = false) {
      if (forceAlsOpen || isAttendantSeat(seat)) return "ALS";
      if (isDutySeat(seat)) return "Duty / Fire";
      if (isDriverSeat(seat)) return "Driver";
      return "Support";
    }

    function hasActualAlsAssigned(seats, memberLookup) {
      return (seats || []).some(seat => {
        const rawName = String(seat?.assigned_name || "").trim();
        if (isOpenName(rawName)) return false;
        return isAttendantSeat(seat) && seatCertValue(seat, memberLookup) === "ALS";
      });
    }

    function shouldShowOpenAls(seats, memberLookup, shiftDate) {
      if (isPastDate(shiftDate)) return false;
      const hasAttendant = (seats || []).some(seat => isAttendantSeat(seat));
      return hasAttendant && !hasActualAlsAssigned(seats, memberLookup);
    }


    function pillClassForShift(shift) {
      const seats = Array.isArray(shift?.seats) ? shift.seats : [];
      const hasOpen = seats.some(seat => !seat?.assigned_name || String(seat.assigned_name).trim().toUpperCase() === "OPEN");
      if (hasOpen || shift?.openAls) return "red";
      if (!seats.length) return "gray";
      return "green";
    }

    function normalizeShiftsToDays(raw) {
      const inputShifts = Array.isArray(raw?.shifts) ? raw.shifts : [];
      const days = {};

      for (const shift of inputShifts) {
        const date = shift?.date || shift?.shift_date || "";
        if (!date) continue;
        if (!days[date]) days[date] = [];

        const label = shift?.label || shift?.name || shift?.shift || shift?.unit || "Shift";
        const seats = Array.isArray(shift?.seats) ? shift.seats : [];

        const visibleSeats = seats.filter(seat => {
          const showOnBoard = seat?.display_on_board === true;
          const hasAssigned = !!String(seat?.assigned_name || seat?.assigned || "").trim();
          return showOnBoard || hasAssigned;
        });

        if (!visibleSeats.length) continue;

        days[date].push({
          date,
          label: shortShiftLabel(label),
          pillClass: pillClassForShift({ ...shift, seats: visibleSeats }),
          seats: visibleSeats
        });
      }

      for (const date of Object.keys(days)) {
        days[date].sort((a, b) => {
          const aLabel = a.label || "";
          const bLabel = b.label || "";
          return aLabel.localeCompare(bLabel, undefined, { numeric: true, sensitivity: "base" });
        });
      }

      return days;
    }

    function renderSlot(seat, shiftDate, memberLookup, options = {}) {
      const assignedId = String(seat?.assigned || "").trim();
      const rawName = String(
        seat?.assigned_name ||
        memberLookup?.byId?.get(assignedId)?.name ||
        ""
      ).trim();
      const pastDate = isPastDate(shiftDate);
      const showOpenAlert = seat?.display_open_alert === true || options.forceOpenAls === true;

      if (!rawName && !showOpenAlert) return "";

      const displayName = rawName
        ? displayAssignedName(shiftDate, rawName)
        : (pastDate ? "—" : (options.forceOpenAls ? "OPEN ALS" : "OPEN"));

      const normalizedName = String(displayName || "").trim().toUpperCase();
      const isFutureOpen = !pastDate && (options.forceOpenAls || normalizedName === "OPEN" || normalizedName === "OPEN ALS" || (!rawName && showOpenAlert));
      const hasMember = !!rawName && rawName.toUpperCase() !== "OPEN";
      const memberClass = hasMember ? colorClassFromSeat(seat, memberLookup) : (pastDate ? "default" : "empty");
      const openSeatClass = isFutureOpen ? `open-seat ${openUrgencyClass(shiftDate)}` : "";
      const dutyClass = isDutySeat(seat) ? "duty-seat" : "";
      const role = seatRoleLabel(seat, options.forceOpenAls);
      const note = options.forceOpenAls ? "No AEMT assigned" : "";

      return `
        <div class="slot ${openSeatClass} ${dutyClass}">
          <div class="seat-role">${escapeHtml(role)}</div>
          <div class="member ${memberClass}">${escapeHtml(displayName)}</div>
          ${note ? `<div class="slot-note">${escapeHtml(note)}</div>` : ``}
        </div>
      `;
    }

    function renderShiftCard(shift, memberLookup) {
      const showOpenAls = shouldShowOpenAls(shift.seats || [], memberLookup, shift.date);
      const orderedSeats = (shift.seats || [])
        .slice()
        .sort((left, right) => {
          const priority = seatSortPriority(left, memberLookup) - seatSortPriority(right, memberLookup);
          if (priority !== 0) return priority;
          return String(left?.role || "").localeCompare(String(right?.role || ""));
        });

      const renderedSlots = [
        ...(showOpenAls ? [renderSlot({ role: "ATTENDANT", display_role: "ALS Attendant", display_open_alert: true }, shift.date, memberLookup, { forceOpenAls: true })] : []),
        ...orderedSeats.map(seat => {
          if (showOpenAls && isAttendantSeat(seat) && seatCertValue(seat, memberLookup) !== "ALS") {
            return renderSlot({ ...seat, role: "SUPPORT", display_role: "Support" }, shift.date, memberLookup);
          }
          return renderSlot(seat, shift.date, memberLookup);
        })
      ]
        .filter(Boolean);

      const slotsHtml = renderedSlots.length
        ? renderedSlots.join("")
        : `
          <div class="slot">
            <div class="member default">—</div>
          </div>
        `;

      return `
        <div class="shift-card ${showOpenAls ? "red" : shift.pillClass}">
          <div class="shift-top">
            <div class="shift-name">${escapeHtml(shift.label)}</div>
            <div class="shift-status">${showOpenAls ? "Open ALS" : "Staffed"}</div>
          </div>
          <div class="slots">${slotsHtml}</div>
        </div>
      `;
    }

    function monthBoundaryClasses(visibleDates, index) {
      const current = visibleDates[index]?.dateObj;
      if (!current) return "";
      const rowStart = Math.floor(index / 7) * 7;
      const rowEnd = Math.min(rowStart + 6, visibleDates.length - 1);
      const rowDates = visibleDates.slice(rowStart, rowEnd + 1).map(item => item.dateObj);
      const currentMonthKey = `${current.getFullYear()}-${current.getMonth()}`;

      const rowContainsOtherMonth = rowDates.some(d => `${d.getFullYear()}-${d.getMonth()}` !== currentMonthKey);
      const rowStartsMonth = rowDates.some(d => d.getDate() === 1 && d.getMonth() === current.getMonth() && d.getFullYear() === current.getFullYear());
      const rowEndsMonth = rowDates.some((d, i) => {
        const next = rowDates[i + 1];
        return !next || next.getMonth() !== d.getMonth() || next.getFullYear() !== d.getFullYear();
      }) && rowContainsOtherMonth;

      const prev = visibleDates[index - 1]?.dateObj || null;
      const next = visibleDates[index + 1]?.dateObj || null;
      const prevDifferentMonth = !!prev && (prev.getMonth() !== current.getMonth() || prev.getFullYear() !== current.getFullYear());
      const nextDifferentMonth = !!next && (next.getMonth() !== current.getMonth() || next.getFullYear() !== current.getFullYear());

      const classes = [];
      if (rowStartsMonth) classes.push("month-row-start");
      if (rowEndsMonth) classes.push("month-row-end");
      if (nextDifferentMonth) classes.push("month-boundary-right");
      if (prevDifferentMonth) classes.push("month-boundary-left");

      return classes.join(" ");
    }

    function renderDayCard(iso, dayShifts, todayIso, visibleDates, index, memberLookup) {
      const dayFmt = formatDayParts(iso);
      let dayClass = "future";
      if (compareIso(iso, todayIso) < 0) dayClass = "past";
      if (iso === todayIso) dayClass = "today";

      const monthClasses = monthBoundaryClasses(visibleDates, index);
      const shiftsHtml = dayShifts.length ? dayShifts.map(shift => renderShiftCard(shift, memberLookup)).join("") : "";
      const birthdayIndicator = hasBirthdayAssignmentForDate(iso, dayShifts, memberLookup) ? "🎂" : "";

      return `
        <section class="day-card ${dayClass} ${monthClasses}">
          <div class="day-header">
            <div class="day-number">${escapeHtml(dayFmt.dayNum)}</div>
            <div class="day-meta">
              <div class="day-title">${escapeHtml(dayFmt.weekday)}</div>
              <div class="day-subtitle">${escapeHtml(dayFmt.monthLabel)}</div>
            </div>
            <div class="birthday-indicator">${birthdayIndicator}</div>
          </div>
          <div class="shift-list">${shiftsHtml}</div>
        </section>
      `;
    }

    function hasBirthdayAssignmentForDate(iso, dayShifts, memberLookup) {
      const monthDay = String(iso || "").slice(5, 10);
      if (!monthDay) return false;
      for (const shift of dayShifts || []) {
        for (const seat of shift?.seats || []) {
          const member = resolveMemberEntry(seat, memberLookup);
          if (member?.birthdayMonthDay === monthDay) return true;
        }
      }
      return false;
    }

    function renderSchedule(data) {
      const app = document.getElementById("app");
      const subtitle = document.getElementById("subtitle");
      const metaWindow = document.getElementById("metaWindow");
      const metaUpdated = document.getElementById("metaUpdated");

      const daysMap = normalizeShiftsToDays(data);
      const shifts = Array.isArray(data?.shifts) ? data.shifts : [];
      const todayIso = getTodayIso();
      const visibleDates = buildVisibleDates(currentWeekOffset);
      const offsetLabel = currentWeekOffset === 0 ? "Today focus" : `${currentWeekOffset > 0 ? "+" : ""}${currentWeekOffset} week`;

      subtitle.textContent = `Here is who is working. Here is what is open. ${offsetLabel}`;
      metaUpdated.textContent = `Updated: ${formatGeneratedAt(data?.build?.generated_at)}`;
      metaWindow.textContent = `Showing: ${visibleDates[0].iso} to ${visibleDates[visibleDates.length - 1].iso}`;

      if (!shifts.length) {
        showNoScheduleBuilt();
        return;
      }

      app.className = "board";
      app.innerHTML = visibleDates.map((day, index) => renderDayCard(day.iso, daysMap[day.iso] || [], todayIso, visibleDates, index, data?.memberLookup)).join("");
    }

    function rerender() {
      if (lastLoadedData) renderSchedule(lastLoadedData);
    }

    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        if (currentWeekOffset !== 0) {
          currentWeekOffset = 0;
          rerender();
        }
      }, IDLE_RESET_MS);
    }

    function registerInteractionHandlers() {
      ["mousemove", "mousedown", "keydown", "touchstart", "wheel"].forEach(eventName => {
        window.addEventListener(eventName, resetIdleTimer, { passive: true });
      });

      document.getElementById("prevWeekBtn").addEventListener("click", () => {
        currentWeekOffset -= 1;
        rerender();
        resetIdleTimer();
      });

      document.getElementById("todayBtn").addEventListener("click", () => {
        currentWeekOffset = 0;
        rerender();
        resetIdleTimer();
      });

      document.getElementById("nextWeekBtn").addEventListener("click", () => {
        currentWeekOffset += 1;
        rerender();
        resetIdleTimer();
      });
    }

    async function loadSchedule() {
      renderRuntimeMeta();

      try {
        const scheduleResponse = await fetchJson(SCHEDULE_URL, SCHEDULE_TIMEOUT_MS);
        const scheduleData = schedulePayload(scheduleResponse.data);
        let membersData = { members: [] };

        try {
          const membersResponse = await fetchJson(MEMBERS_URL, MEMBERS_TIMEOUT_MS);
          membersData = membersResponse.data;
        } catch (error) {
          console.warn("Wallboard member list did not load. Names from the schedule will still be shown.", error);
        }

        lastLoadedData = {
          ...scheduleData,
          memberLookup: buildMemberLookup(membersData)
        };

        renderWeekdayRow();
        renderSchedule(lastLoadedData);
      } catch (error) {
        console.error("Failed to load wallboard data:", error);
        showApiError(error);
      }
    }

    renderWeekdayRow();
    renderRuntimeMeta();
    registerInteractionHandlers();
    resetIdleTimer();
    loadSchedule();
    setInterval(loadSchedule, REFRESH_MS);
  </script>
</body>
